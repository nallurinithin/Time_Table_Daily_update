name: CI/CD — Docker Build & Push to Docker Hub

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  DOCKER_IMAGE_NAME: timetable-dashboard
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint / Validate the HTML file
  # ─────────────────────────────────────────
  validate:
    name: 🔍 Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📄 Check index.html exists
        run: |
          if [ -f "index.html" ]; then
            echo "✅ index.html found"
            wc -l index.html
          else
            echo "❌ index.html NOT found!"
            exit 1
          fi

      - name: 🔍 Validate HTML structure (basic check)
        run: |
          if grep -q "<!DOCTYPE html>" index.html; then
            echo "✅ DOCTYPE found"
          else
            echo "❌ DOCTYPE missing!"
            exit 1
          fi

          if grep -q "</html>" index.html; then
            echo "✅ Closing </html> tag found"
          else
            echo "❌ Closing </html> tag missing!"
            exit 1
          fi
          echo "✅ HTML basic validation passed"

  # ─────────────────────────────────────────
  # JOB 2: Build Docker Image
  # ─────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker image (test build, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Build succeeded
        run: echo "Docker image built successfully!"

  # ─────────────────────────────────────────
  # JOB 3: Push to Docker Hub (on push to main only)
  # ─────────────────────────────────────────
  push:
    name: 🚀 Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    # Only run on actual push to main/master (not PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 📦 Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: 🚀 Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🎉 Push complete — Summary
        run: |
          echo "====================================="
          echo "✅ Docker image pushed to Docker Hub!"
          echo "Image: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "====================================="
