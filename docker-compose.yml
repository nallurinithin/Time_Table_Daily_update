# ============================================================
# docker-compose.yml
# For local development and testing of the containerized app
# ============================================================

version: '3.8'

services:
  timetable-app:
    # Build from the local Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
    
    # Container name
    container_name: timetable-dashboard
    
    # Map host port 8080 -> container port 80
    # Access the app at: http://localhost:8080
    ports:
      - "8080:80"
    
    # Always restart unless manually stopped
    restart: unless-stopped
    
    # Health check — verifies nginx is serving correctly
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits (optional but good practice)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

# No external volumes needed — static site
