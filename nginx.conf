server {
    listen 80;
    server_name localhost;

    # Root directory where static files are served from
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files; fallback to index.html for SPA-style routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enable gzip compression for performance
    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 256;

    # Cache static assets for 7 days
    location ~* \.(html|css|js|png|jpg|gif|svg|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Disable access to hidden files
    location ~ /\. {
        deny all;
    }

    # Custom error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
